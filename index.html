        <div class="form-title" style="font-size:1.8rem;margin-bottom:2rem;">Admin</div>
        <div id="adminMsg"></div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="adminPass" placeholder="·  ·  ·  ·  ·  ·  ·  ·" onkeydown="if(event.key==='Enter')adminLogin()" />
        </div>
        <button class="btn btn-solid" onclick="adminLogin()">Enter</button>
      </div>`;
    return;
  }

  const [{ data: pend }, { data: appr }, { data: wl }] = await Promise.all([
    sb.from('guests').select('*').eq('status','pending').order('created_at'),
    sb.from('guests').select('*').eq('status','approved').order('created_at'),
    sb.from('guests').select('*').eq('status','waitlisted').order('created_at'),
  ]);
  adminCachedData = { pend: pend||[], appr: appr||[], wl: wl||[] };

  await Promise.all([loadAdminData(), loadSocialData()]);
  buildAdminHTML(el);
}

function buildAdminHTML(el) {
  const { pend: pendList, appr: apprList, wl: wlList } = adminCachedData;

  // ── computed stats ──────────────────────────────────────────────
  const aPct = CONFIG.capacity > 0 ? Math.min(100, Math.round(apprList.length / CONFIG.capacity * 100)) : 0;
  const arrivedCount = apprList.filter(g => doorCheckins[g.id]).length;

  // vibe breakdown across all approved guests
  const vibeCounts = {};
  for (const g of apprList) { for (const v of (g.vibes||[])) vibeCounts[v] = (vibeCounts[v]||0)+1; }
  const vibeOrder = [['up','↑','vc-up'],['down','↓','vc-down'],['dash','—','vc-dash'],['verse','↕','vc-verse']];
  const vibeChips = vibeOrder.filter(([k])=>vibeCounts[k]).map(([k,sym,cls])=>
    `<span class="vibe-chip ${cls}">${sym}<span class="vibe-chip-count">${vibeCounts[k]}</span></span>`).join('');

  // social insights
  const engagedIds = new Set([
    ...Object.keys(socialData.fires).filter(id=>(socialData.fires[id]||[]).length>0),
    ...Object.keys(socialData.saved).filter(id=>(socialData.saved[id]||[]).length>0),
  ]);
  const engagementPct = apprList.length > 0 ? Math.round(engagedIds.size / apprList.length * 100) : 0;

  const mutualPairsSeen = new Set();
  for (const a of Object.keys(socialData.fires)) {
    for (const b of (socialData.fires[a]||[])) {
      if ((socialData.fires[b]||[]).includes(a)) {
        const key = [a,b].sort().join('|');
        mutualPairsSeen.add(key);
      }
    }
  }
  const mutualCount = mutualPairsSeen.size;
  const totalFires  = Object.values(socialData.fires).reduce((s,arr)=>s+arr.length,0);

  // top guests by fires received
  const hotGuests = apprList
    .map(g => ({ g, fr: Object.values(socialData.fires).filter(arr=>arr.includes(g.id)).length }))
    .filter(x => x.fr > 0)
    .sort((a,b) => b.fr - a.fr)
    .slice(0, 5);

  // ── tab content ─────────────────────────────────────────────────
  const tabOverview = adminTab === 'overview' ? `
    <div class="admin-stats-bar">
      <div class="admin-stat-cell">
        <div class="admin-stat-val">${apprList.length} <span style="font-size:1.2rem;color:var(--muted);">/ ${CONFIG.capacity}</span></div>
        <div class="admin-stat-lbl">Confirmed</div>
        <div class="admin-cap-track"><div class="admin-cap-fill" style="width:${aPct}%;background:${aPct>=90?'linear-gradient(to right,#c84040,#e05050)':aPct>=75?'linear-gradient(to right,#c87c30,#d4984a)':'linear-gradient(to right,var(--gold-dim),var(--gold))'}"></div></div>
        ${aPct>=90?`<div style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:#e05050;margin-top:0.3rem;">At capacity</div>`:(aPct>=75?`<div style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:#d4984a;margin-top:0.3rem;">Nearly full</div>`:'')}
      </div>
      <div class="admin-stat-cell">
        <div class="admin-stat-val">${pendList.length}${pendList.length > 0 ? `<span class="pending-pulse"></span>` : ''}</div>
        <div class="admin-stat-lbl">Pending</div>
      </div>
      ${CONFIG.waitlistEnabled ? `
      <div class="admin-stat-cell">
        <div class="admin-stat-val">${wlList.length}${wlList.length > 0 ? `<span class="pending-pulse wl-pulse"></span>` : ''}</div>
        <div class="admin-stat-lbl">Waitlist</div>
      </div>` : ''}
      <div class="admin-stat-cell">
        <div class="admin-stat-val arrived-col" style="color:#4caf80;">${arrivedCount}</div>
        <div class="admin-stat-lbl">Arrived</div>
      </div>
    </div>

    ${vibeChips ? `
    <div class="vibe-breakdown">
      <span class="vibe-breakdown-label">Vibes</span>
      ${vibeChips}
    </div>` : ''}

    <div class="section-label" style="margin-bottom:1rem;">Social Pulse</div>
    <div class="insights-grid">
      <div class="insight-cell">
        <div class="insight-val">${engagementPct}<span style="font-size:1.2rem;color:var(--muted);">%</span></div>
        <div class="insight-lbl">Engaged</div>
        <div class="insight-sub">${engagedIds.size} of ${apprList.length} interacted</div>
      </div>
      <div class="insight-cell">
        <div class="insight-val fire-col">${mutualCount}</div>
        <div class="insight-lbl">Mutual Fires</div>
        <div class="insight-sub">${totalFires} total fires cast</div>
      </div>
      <div class="insight-cell">
        <div class="insight-val arrived-col">${arrivedCount}</div>
        <div class="insight-lbl">At the Door</div>
        <div class="insight-sub">${apprList.length - arrivedCount} still expected</div>
      </div>
      <div class="insight-cell">
        <div class="insight-val" style="color:var(--muted);">${apprList.filter(g=>Object.values(socialData.fires).filter(arr=>arr.includes(g.id)).length===0).length}</div>
        <div class="insight-lbl">Cold Guests</div>
        <div class="insight-sub">no fires received yet</div>
      </div>
    </div>

    ${hotGuests.length ? `
    <div class="section-label" style="margin-bottom:1rem;">Most Fired</div>
    <div class="hot-guests-list">
      ${hotGuests.map((x,i) => {
        const mutuals = (socialData.fires[x.g.id]||[]).filter(id=>(socialData.fires[id]||[]).includes(x.g.id)).length;
        return `<div class="hot-guest-row">
          <span class="hot-rank">${i+1}</span>
          <span class="hot-name">${esc(x.g.name)}</span>
          <span class="hot-fires">🔥 ${x.fr}</span>
          ${mutuals ? `<span class="hot-mutual">${mutuals} mutual</span>` : ''}
        </div>`;
      }).join('')}
    </div>` : ''}
  ` : '';

  const pendingItemHTML = g => {
    const thumb = g.photos&&g.photos[0]?g.photos[0]:null;
    const photos = g.photos||[];
    const vibeMap = {up:'#e05050',down:'#5bc8f5',dash:'#d4b84a'};
    const symMap  = {up:'↑',down:'↓',dash:'—'};
    const vibes   = g.vibes||[];
    return `
    <div class="pending-item">
      <div class="p-header">
        ${thumb?`<img class="p-thumb" src="${thumb}" alt="" />`:`<div class="p-thumb-ph">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
        <div class="p-info">
          <div class="p-name">${esc(g.name)}</div>

        </div>
      </div>
      ${photos.length ? `<div class="p-photo-grid">${photos.map(src=>`<img src="${esc(src)}" alt="" data-src="${esc(src)}" onclick="openLightbox(this.dataset.src)">`).join('')}</div>` : ''}
      <div class="p-details-row">
        ${vibes.length ? `<div class="p-section"><div class="p-label">Vibes</div><div style="display:flex;gap:.4rem;margin-top:.2rem;">${vibes.map(v=>`<span style="font-family:'Cormorant',serif;font-size:1.5rem;line-height:1;color:${vibeMap[v]||'#888'};border:1px solid ${vibeMap[v]||'#888'}44;padding:.2rem .6rem;">${symMap[v]||v}</span>`).join('')}</div></div>` : ''}
        ${g.age ? `<div class="p-section"><div class="p-label">Age</div><div class="p-value">${g.age}</div></div>` : ''}
        ${g.last_tested ? `<div class="p-section"><div class="p-label">Last Tested</div><div class="p-value">${esc(g.last_tested)}</div></div>` : ''}
        ${g.prep ? `<div class="p-section"><div class="p-label">PrEP</div><div class="p-value">${g.prep==='yes'?'Yes':'No'}</div></div>` : ''}

      ${g.bio ? `<div class="p-section"><div class="p-label">About</div><div class="p-bio">${esc(g.bio).replace(/\n/g,'<br>')}</div></div>` : ''}

      </div>
    </div>`;
  };

  // apply search filter + sort to confirmed list
  const searchQ = adminSearchQ.toLowerCase();
  const filteredPend = searchQ ? pendList.filter(g=>(g.name||'').toLowerCase().includes(searchQ)) : pendList;
  let filteredAppr = searchQ ? apprList.filter(g=>(g.name||'').toLowerCase().includes(searchQ)) : [...apprList];
  if (adminSortBy === 'name') filteredAppr.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if (adminSortBy === 'fires') filteredAppr.sort((a,b)=>{
    const fa = Object.values(socialData.fires).filter(arr=>arr.includes(a.id)).length;
    const fb = Object.values(socialData.fires).filter(arr=>arr.includes(b.id)).length;
    return fb - fa;
  });
  else if (adminSortBy === 'arrived') filteredAppr.sort((a,b)=>(doorCheckins[b.id]?1:0)-(doorCheckins[a.id]?1:0));
  // default 'date' keeps original order

  const tabGuests = adminTab === 'guests' ? `
    <div class="admin-search-row">
      <input class="admin-search-input" type="text" id="guestSearch" placeholder="Search guests by name…" oninput="filterGuests(this.value)" value="${esc(adminSearchQ)}" />
      <select class="admin-sort-select" id="guestSort" onchange="sortGuests(this.value)">
        <option value="date" ${adminSortBy==='date'?'selected':''}>Date joined</option>
        <option value="name" ${adminSortBy==='name'?'selected':''}>Name A–Z</option>
        <option value="fires" ${adminSortBy==='fires'?'selected':''}>Most fired</option>
        <option value="arrived" ${adminSortBy==='arrived'?'selected':''}>Arrived first</option>
      </select>
      <button class="admin-export-btn" onclick="exportGuestCSV()">↓ Export CSV</button>
    </div>

    <div class="admin-section-header">
      <div class="section-label" style="margin-bottom:0;">Pending Approval — ${filteredPend.length}${searchQ&&filteredPend.length!==pendList.length?` <span style="font-size:.8em;color:var(--muted)">of ${pendList.length}</span>`:''}</div>
      ${!searchQ && pendList.length > 1 ? `<button class="admin-bulk-btn" onclick="approveAllPending()">Approve All (${pendList.length})</button>` : ''}
    </div>
    <div class="pending-list">
      ${!filteredPend.length ? `<div class="empty-state">${searchQ?`<span class="admin-filter-empty">No matches for "${esc(adminSearchQ)}"</span>`:'No pending submissions.'}</div>` : filteredPend.map(pendingItemHTML).join('')}
    </div>

    <hr class="div" />

    <div class="section-label">Waitlist — ${wlList.length}</div>
    <p style="font-family:'Cormorant',serif;font-size:1rem;font-style:italic;color:var(--muted);margin-bottom:1.5rem;">
      ${CONFIG.waitlistEnabled
        ? 'Guests held here when the event reached capacity. Promote moves them directly to Confirmed — no separate approval step.'
        : 'Waitlist is currently off. When enabled, guests who apply after capacity is reached are queued here instead of being turned away.'}
    </p>
    ${!CONFIG.waitlistEnabled ? `
    <div style="margin-bottom:3rem;">
      <button class="btn btn-ghost" onclick="setAdminTab('settings')">Go to Settings to enable →</button>
    </div>` : `
    <div class="pending-list">
      ${!wlList.length ? `<div class="empty-state">No one on the waitlist.</div>` :
        wlList.map((g, idx) => {
          const thumb = g.photos&&g.photos[0]?g.photos[0]:null;
          return `
          <div class="pending-item">
            <div class="p-header">
              <div class="wl-pos">#${idx+1}</div>
              ${thumb?`<img class="p-thumb" src="${thumb}" alt="" />`:`<div class="p-thumb-ph">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
              <div class="p-info">
                <div class="p-name">${esc(g.name)}</div>
                <div class="p-meta">${esc(g.role||'')} · PIN: ${esc(g.pin)} · Joined ${new Date(g.created_at).toLocaleString()}</div>
              </div>
            </div>
            <div class="p-actions">
              <button class="btn btn-blue btn-sm" data-action="promote-waitlist" data-id="${g.id}">Promote to Confirmed</button>
              <button class="btn btn-danger btn-sm" data-action="remove-waitlisted" data-id="${g.id}">Remove</button>
            </div>
          </div>`;
        }).join('')}
    </div>`}

    <hr class="div" />

    <div class="section-label">Confirmed — ${filteredAppr.length}${searchQ&&filteredAppr.length!==apprList.length?` <span style="font-size:.8em;color:var(--muted)">of ${apprList.length}</span>`:''}</div>
    <div class="approved-list">
      ${!filteredAppr.length ? `<div class="empty-state">${searchQ?`<span class="admin-filter-empty">No matches for "${esc(adminSearchQ)}"</span>`:'No confirmed guests yet.'}</div>` :
        filteredAppr.map(g => {
          const thumb = g.photos&&g.photos[0]?g.photos[0]:null;
          const isFlagged  = !!adminData.flagged[g.id];
          const note       = adminData.notes[g.id] || '';
          const isArrived  = !!doorCheckins[g.id];
          const firesRcvd  = Object.values(socialData.fires).filter(arr=>arr.includes(g.id)).length;
          const savesRcvd  = Object.values(socialData.saved).filter(arr=>arr.includes(g.id)).length;
          const firesGiven = (socialData.fires[g.id]||[]).length;
          const mutuals    = (socialData.fires[g.id]||[]).filter(id=>(socialData.fires[id]||[]).includes(g.id)).length;
          const socialLine = (firesRcvd||savesRcvd||firesGiven) ? `
            <div style="font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.12em;color:var(--muted);margin-top:0.2rem;">
              🔥 ${firesRcvd} rcvd · ${firesGiven} sent${mutuals?` · <span style="color:#e05050">${mutuals} mutual</span>`:''}
              ${savesRcvd ? `&ensp;★ ${savesRcvd} saved` : ''}
            </div>` : '';
          return `
          <div class="approved-item">
            ${thumb?`<img class="p-thumb" src="${thumb}" alt="" />`:`<div class="p-thumb-ph">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
            <div class="a-name" style="flex:1;">
              ${esc(g.name)}
              <span style="color:var(--gold-dim);font-size:.8rem"> · ${esc(g.role||'')}</span>
              <span style="color:var(--muted);font-size:.72rem"> · PIN: ${esc(g.pin)}</span>
              ${socialLine}
            </div>
            <div style="display:flex;gap:0.5rem;align-items:center;">
              ${isArrived ? `<span class="checkin-badge">✓ Here</span>` : ''}
              <button class="a-flag-btn ${isFlagged?'flagged':''}" data-action="flag" data-id="${g.id}" title="${isFlagged?'Flagged — click to unflag':'Flag guest'}">⚑</button>
              <button class="btn btn-danger btn-sm" data-action="remove" data-id="${g.id}">Remove</button>
            </div>
            <textarea class="a-note-input" rows="1" placeholder="Private note…" data-note-id="${g.id}" onblur="saveNote(this.dataset.noteId, this.value)">${esc(note)}</textarea>
          </div>`;
        }).join('')}
    </div>
  ` : '';

  const tabAnnounce = adminTab === 'announce' ? `
    <div class="section-label">Announcement</div>
    <p style="font-family:'Cormorant',serif;font-size:1rem;font-style:italic;color:var(--muted);margin-bottom:1.5rem;">Shown to all guests above the roster. Leave blank to hide.</p>
    <div class="form-group">
      <label>Message</label>
      <textarea id="annText" rows="4" placeholder="Write something for your guests…">${esc(CONFIG.announcementText||'')}</textarea>
    </div>
    <div class="form-group">
      <label>Images <span style="opacity:.45;font-size:.8em">(up to 6 · optional · click to enlarge)</span></label>
      <div class="ann-grid" id="annGrid">
        ${[0,1,2,3,4,5].map(i => {
          const src = (CONFIG.announcementImages||[])[i] || null;
          return `<div class="ann-grid-slot" id="annSlot${i}">
            ${src
              ? `<img class="ann-grid-preview" src="${esc(src)}" alt="" data-src="${esc(src)}" onclick="openLightbox(this.dataset.src)" />
                 <button class="slot-remove" onclick="clearAnnSlot(${i})">✕</button>`
              : `<div class="ann-grid-slot-inner" onclick="triggerAnnSlot(${i})">
                   <div class="slot-icon" style="font-size:1.2rem">✦</div>
                   <div class="slot-label">Add photo</div>
                 </div>`}
            <input type="file" id="annFile${i}" accept="image/*" style="display:none" onchange="loadAnnSlot(${i},event)" />
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:flex;gap:1rem;margin-bottom:3rem;">
      <button class="btn btn-solid" id="annSaveBtn" onclick="saveAnnouncement()">Save Announcement</button>
    </div>
  ` : '';

  const tabSettings = adminTab === 'settings' ? `
    <div class="section-label">Event Settings</div>
    <div class="settings-grid">
      <div class="form-group"><label>Event Name</label><input type="text" id="sName" value="${esc(CONFIG.eventName||'')}" /></div>
      <div class="form-group"><label>Capacity</label><input type="number" id="sCap" value="${CONFIG.capacity}" min="1" /></div>
      <div class="form-group"><label>Date / Time <span style="opacity:.45;font-size:.8em">(display)</span></label><input type="text" id="sDate" value="${esc(CONFIG.eventDate||'')}" /></div>
      <div class="form-group"><label>Countdown Target</label><input type="datetime-local" id="sDateISO" value="${esc(CONFIG.eventDateISO||'')}" /></div>
      <div class="form-group"><label>Location</label><input type="text" id="sLoc" value="${esc(CONFIG.eventLocation||'')}" /></div>
      <div class="form-group"><label>Guest Preview PIN</label><input type="text" id="sGuestPin" value="${esc(CONFIG.guestPreviewPin||'')}" maxlength="6" inputmode="numeric" /></div>
    </div>

    <div class="section-label" style="margin-bottom:0.8rem;">Event Phase</div>
    <div class="phase-selector" style="margin-bottom:2rem;">
      <button class="phase-btn ${CONFIG.eventPhase==='pre'?'active':''}" data-phase="pre" onclick="selectPhase('pre')">Pre-Event</button>
      <button class="phase-btn phase-live ${CONFIG.eventPhase==='live'?'active':''}" data-phase="live" onclick="selectPhase('live')">Live</button>
      <button class="phase-btn phase-closed ${CONFIG.eventPhase==='closed'?'active':''}" data-phase="closed" onclick="selectPhase('closed')">Closed</button>
    </div>

    <div class="settings-toggles">
      <label class="pill-toggle-wrap">
        <span class="toggle-label">Enable Waitlist</span>
        <div class="pill-toggle">
          <input type="checkbox" id="sWaitlistEnabled" ${CONFIG.waitlistEnabled?'checked':''} />
          <span class="pill-slider"></span>
        </div>
      </label>
    </div>
    <div style="display:flex;gap:1rem;margin-bottom:3rem;margin-top:1.5rem;">
      <button class="btn btn-solid" onclick="saveSettings()">Save Settings</button>
      <button class="btn btn-ghost" onclick="adminLogout()">Log Out</button>
    </div>
  ` : '';

  el.innerHTML = `
    <div class="admin-tabs">
      <button class="admin-tab-btn ${adminTab==='overview'?'active':''}" onclick="setAdminTab('overview')">Overview</button>
      <button class="admin-tab-btn ${adminTab==='guests'?'active':''}" onclick="setAdminTab('guests')">
        Guests${pendList.length ? `<span class="admin-tab-count">${pendList.length}</span>` : ''}
      </button>
      <button class="admin-tab-btn ${adminTab==='announce'?'active':''}" onclick="setAdminTab('announce')">Announce</button>
      <button class="admin-tab-btn ${adminTab==='settings'?'active':''}" onclick="setAdminTab('settings')">Settings</button>
    </div>
    ${tabOverview}${tabGuests}${tabAnnounce}${tabSettings}
  `;
}

function adminLogin() {
  if (document.getElementById('adminPass').value === CONFIG.adminPassword) {
    adminIn=true;
    document.getElementById('doorNavBtn').style.display = '';
    renderAdmin();
  } else {
    document.getElementById('adminMsg').innerHTML=`<div class="msg msg-error">Incorrect password.</div>`;
  }
}

function adminLogout() {
  adminIn=false;
  adminCachedData=null;
  document.getElementById('doorNavBtn').style.display = 'none';
  renderAdmin();
}

function setAdminTab(tab) {
  adminTab = tab;
  if (adminCachedData) buildAdminHTML(document.getElementById('adminContent'));
}

function selectPhase(phase) {
  CONFIG.eventPhase = phase;
  document.querySelectorAll('#adminContent .phase-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.phase === phase);
  });
}

function _adminRebuild() {
  if (adminCachedData) buildAdminHTML(document.getElementById('adminContent'));
}

async function approveGuest(id) {
  await sb.from('guests').update({status:'approved'}).eq('id',id);
  if (adminCachedData) {
    const g = adminCachedData.pend.find(x => x.id === id);
    if (g) {
      adminCachedData.pend = adminCachedData.pend.filter(x => x.id !== id);
      adminCachedData.appr = [...adminCachedData.appr, {...g, status:'approved'}]
        .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    }
  }
  _adminRebuild(); renderRoster();
}

async function rejectGuest(id) {
  await sb.from('guests').delete().eq('id',id);
  if (adminCachedData) adminCachedData.pend = adminCachedData.pend.filter(x => x.id !== id);
  _adminRebuild(); renderRoster();
}

async function removeGuest(id) {
  const { data: g, error } = await sb.from('guests').select('name').eq('id',id).single();
  if (error || !g) return;
  if (!window.confirm(`Remove ${g.name}?`)) return;
  await sb.from('guests').delete().eq('id',id);
  if (adminCachedData) adminCachedData.appr = adminCachedData.appr.filter(x => x.id !== id);
  _adminRebuild(); renderRoster();
}

async function promoteFromWaitlist(id) {
  const { data: g } = await sb.from('guests').select('*').eq('id',id).single();
  if (!g) return;
  if (!window.confirm(`Promote ${g.name} to Confirmed? This skips the approval queue.`)) return;
  await sb.from('guests').update({status:'approved'}).eq('id',id);
  if (adminCachedData) {
    adminCachedData.wl = adminCachedData.wl.filter(x => x.id !== id);
    adminCachedData.appr = [...adminCachedData.appr, {...g, status:'approved'}]
      .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  }
  _adminRebuild(); renderRoster();
}

async function removeWaitlisted(id) {
  const { data: g, error } = await sb.from('guests').select('name').eq('id',id).single();
  if (error || !g) return;
  if (!window.confirm(`Remove ${g.name} from the waitlist?`)) return;
  await sb.from('guests').delete().eq('id',id);
  if (adminCachedData) adminCachedData.wl = adminCachedData.wl.filter(x => x.id !== id);
  _adminRebuild();
}

// Event delegation for admin buttons
document.addEventListener('click', async function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn || btn.dataset.busy) return;
  btn.dataset.busy = '1'; // prevent double-click; btn is destroyed by re-render so no need to unset
  const action = btn.dataset.action, id = btn.dataset.id;
  if (action === 'approve')            await approveGuest(id);
  else if (action === 'reject')        await rejectGuest(id);
  else if (action === 'remove')        await removeGuest(id);
  else if (action === 'flag')          await toggleFlag(id);
  else if (action === 'promote-waitlist')  await promoteFromWaitlist(id);
  else if (action === 'remove-waitlisted') await removeWaitlisted(id);
});

// ══ LIGHTBOX ════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  if (!document.getElementById('modalBackdrop').classList.contains('open')) lockScroll();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  if (!document.getElementById('modalBackdrop').classList.contains('open')) unlockScroll();
}

// ══ ANNOUNCEMENT ════════════════════════════════════════════════════
let annSlots = [null, null, null, null, null, null]; // pending uploads; null = unchanged

function triggerAnnSlot(i) { document.getElementById('annFile'+i).click(); }

function loadAnnSlot(i, e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 1200; let w = img.width, h = img.height;
      if (w > max || h > max) { if (w > h) { h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; } }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      annSlots[i] = c.toDataURL('image/jpeg', 0.82);
      const slot = document.getElementById('annSlot'+i);
      slot.querySelector('.ann-grid-slot-inner')?.remove();
      slot.querySelector('.ann-grid-preview')?.remove();
      slot.querySelector('.slot-remove')?.remove();
      const preview = document.createElement('img');
      preview.className = 'ann-grid-preview';
      preview.src = annSlots[i];
      preview.onclick = () => openLightbox(annSlots[i]);
      const removeBtn = document.createElement('button');
      removeBtn.className = 'slot-remove';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => clearAnnSlot(i);
      slot.appendChild(preview);
      slot.appendChild(removeBtn);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearAnnSlot(i) {
  annSlots[i] = '';
  const slot = document.getElementById('annSlot'+i);
  slot.querySelector('.ann-grid-preview')?.remove();
  slot.querySelector('.slot-remove')?.remove();
  const inner = document.createElement('div');
  inner.className = 'ann-grid-slot-inner';
  inner.onclick = () => triggerAnnSlot(i);
  inner.innerHTML = `<div class="slot-icon" style="font-size:1.2rem">✦</div><div class="slot-label">Add photo</div>`;
  slot.appendChild(inner);
}

async function saveAnnouncement() {
  const text = document.getElementById('annText').value.trim();
  const images = (CONFIG.announcementImages || []).slice();
  annSlots.forEach((v, i) => { if (v !== null) images[i] = v; });
  // compact: remove trailing empties
  while (images.length && !images[images.length-1]) images.pop();

  CONFIG.announcementText   = text;
  CONFIG.announcementImages = images;

  const btn = document.getElementById('annSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const { error } = await sb.from('config').upsert([
    { key: 'announcementText',   value: text },
    { key: 'announcementImages', value: JSON.stringify(images) },
  ], { onConflict: 'key' });

  btn.disabled = false; btn.textContent = 'Save Announcement';
  annSlots = [null, null, null, null, null, null];

  if (error) { alert('Save failed: ' + error.message); return; }

  const flash = document.createElement('div');
  flash.className = 'msg msg-success';
  flash.style.cssText = 'margin-bottom:1rem;';
  flash.textContent = 'Announcement saved.';
  btn.parentNode.insertBefore(flash, btn);
  setTimeout(() => flash.remove(), 3000);
}

// ══ PREP TOGGLE ═════════════════════════════════════════════════════
function togglePrep(val, btn) {
  const scope = btn.closest('.view') || document;
  if (selectedPrep === val) {
    selectedPrep = null;
    scope.querySelectorAll('.prep-btn').forEach(b => b.classList.remove('selected'));
  } else {
    selectedPrep = val;
    scope.querySelectorAll('.prep-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

async function saveSettings() {
  const n   = document.getElementById('sName').value.trim();
  const c   = parseInt(document.getElementById('sCap').value, 10);
  const dt  = document.getElementById('sDate').value.trim();
  const lc  = document.getElementById('sLoc').value.trim();
  const gp  = document.getElementById('sGuestPin').value.trim();
  const iso = document.getElementById('sDateISO').value;
  const wlEnabled    = document.getElementById('sWaitlistEnabled').checked;

  if (gp && (gp.length !== 6 || !/^\d{6}$/.test(gp))) {
    alert('Guest PIN must be exactly 6 digits (numbers only).'); return;
  }
  if (document.getElementById('sCap').value.trim() && (isNaN(c) || c < 1)) {
    alert('Capacity must be a positive number.'); return;
  }

  if (n)                           CONFIG.eventName        = n;
  if (!isNaN(c) && c > 0)          CONFIG.capacity         = c;
  if (dt)                          CONFIG.eventDate        = dt;
  if (lc)                          CONFIG.eventLocation    = lc;
  if (gp.length === 6)             CONFIG.guestPreviewPin  = gp;
  if (iso)                         CONFIG.eventDateISO     = iso;
  CONFIG.waitlistEnabled  = wlEnabled;

  const updates = [
    { key: 'eventName',        value: CONFIG.eventName },
    { key: 'eventDate',        value: CONFIG.eventDate },
    { key: 'eventLocation',    value: CONFIG.eventLocation },
    { key: 'capacity',         value: String(CONFIG.capacity) },
    { key: 'guestPreviewPin',  value: CONFIG.guestPreviewPin },
    { key: 'eventDateISO',     value: CONFIG.eventDateISO },
    { key: 'waitlistEnabled',  value: String(CONFIG.waitlistEnabled) },
    { key: 'eventPhase',       value: CONFIG.eventPhase },
  ];

  const btn = document.querySelector('#adminContent .btn-solid');
  btn.disabled = true; btn.textContent = 'Saving…';

  const { error } = await sb.from('config').upsert(updates, { onConflict: 'key' });

  btn.disabled = false; btn.textContent = 'Save Settings';

  if (error) {
    alert('Save failed: ' + error.message); return;
  }

  document.getElementById('heroMeta').innerHTML = `${CONFIG.eventDate}&ensp;·&ensp;${CONFIG.eventLocation}`;
  startCountdown();

  // Flash confirmation in admin
  const flash = document.createElement('div');
  flash.className = 'msg msg-success';
  flash.style.cssText = 'margin-bottom:1rem;';
  flash.textContent = 'Settings saved.';
  btn.parentNode.insertBefore(flash, btn.parentNode.firstChild);
  setTimeout(() => flash.remove(), 3000);
}
