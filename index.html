<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Room</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Elysium" />
  <meta name="theme-color" content="#060504" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:       #060504;
      --black-card:  #131008;
      --black-raise: #1c1810;
      --gold:        #c8a84b;
      --gold-light:  #e8cf88;
      --gold-bright: #f0d898;
      --gold-dim:    #b08f35;
      --gold-glow:   rgba(200,168,75,0.18);
      --gold-glow2:  rgba(200,168,75,0.08);
      --neon-blue:   #5bc8f5;
      --neon-purple: #c3a8e8;
      --nb-glow:     rgba(91,200,245,0.14);
      --np-glow:     rgba(195,168,232,0.14);
      --cream:       #f2ead8;
      --muted:       #a09880;
      --muted2:      #786858;
      --border:      rgba(200,168,75,0.22);
      --border-dim:  rgba(200,168,75,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant', Georgia, serif;
      background: var(--black);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(91,200,245,0.04)  0%, transparent 65%),
        radial-gradient(ellipse 60% 45% at 100% 90%, rgba(195,168,232,0.05) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 50% 50%,  rgba(200,168,75,0.03)  0%, transparent 70%);
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 9999; opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 6rem 2rem 4rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(200,168,75,0.04) 0%, transparent 100%);
    }

    .hero-eyebrow { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.55em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 2rem; }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 700; letter-spacing: 0.12em; line-height: 0.9;
      background: linear-gradient(160deg, var(--gold-bright) 0%, var(--gold-light) 30%, var(--gold) 60%, var(--gold-dim) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 40px rgba(200,168,75,0.3)); margin-bottom: 0.3rem;
    }

    .hero-sub { font-family: 'Cormorant', serif; font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 300; font-style: italic; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-dim); margin-top: 0.5rem; }

    .hero-ornament { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 2.5rem auto; }
    .orn-line { width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent); }
    .orn-center { display: flex; align-items: center; gap: 0.6rem; }
    .orn-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(200,168,75,0.4); }
    .orn-dot { width: 3px; height: 3px; background: var(--gold-dim); transform: rotate(45deg); }

    .hero-meta { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); line-height: 2.8; }
    .countdown { display: flex; justify-content: center; gap: 2.5rem; margin-top: 1.8rem; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .countdown-num { font-family: 'Cinzel', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 700; color: var(--gold); line-height: 1; filter: drop-shadow(0 0 18px rgba(200,168,75,0.4)); letter-spacing: 0.05em; }
    .countdown-label { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); }
    .countdown-sep { display: flex; align-items: center; align-self: center; margin-top: -0.5rem; }
    .countdown-sep-diamond { width: 6px; height: 6px; background: var(--gold-dim); transform: rotate(45deg); opacity: 0.5; box-shadow: 0 0 8px rgba(200,168,75,0.4); }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: center;
      border-bottom: 1px solid var(--border);
      background: rgba(6,5,4,0.92);
      backdrop-filter: blur(20px) saturate(1.4);
    }

    nav button { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; background: none; border: none; border-bottom: 1px solid transparent; padding: 1.4rem 3rem 1.3rem; cursor: pointer; color: var(--muted2); transition: color 0.4s, border-color 0.4s, text-shadow 0.4s; margin-bottom: -1px; }
    nav button.active { color: var(--gold-light); border-bottom-color: var(--gold); text-shadow: 0 0 30px rgba(200,168,75,0.5); }
    nav button:hover:not(.active) { color: var(--gold-dim); }

    /* ── MAIN ── */
    main { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 4rem 3rem; }

    .view { display: none; }
    .view.active { display: block; animation: fadeUp 0.5s ease both; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin-bottom: 1px; border: 1px solid var(--border); }
    .stat { background: var(--black-card); padding: 2rem; border-right: 1px solid var(--border-dim); position: relative; }
    .stat:last-child { border-right: none; }
    .stat::before { content: ''; position: absolute; bottom: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent); }
    .stat-num { font-family: 'Cormorant', serif; font-size: 4rem; font-weight: 300; line-height: 1; color: var(--gold); }
    .stat-num.blue   { color: var(--gold-light); text-shadow: 0 0 30px var(--gold-glow); }
    .stat-num.purple { color: var(--neon-purple); text-shadow: 0 0 30px var(--np-glow); }
    .stat-num.dim    { color: var(--muted); }
    .stat-label { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-top: 0.5rem; }

    .cap-wrap { background: var(--black-card); border: 1px solid var(--border); border-top: none; padding: 1.6rem 2rem; margin-bottom: 4rem; }
    .cap-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .cap-label { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); }
    .cap-count { font-family: 'Cormorant', serif; font-size: 1rem; letter-spacing: 0.1em; color: var(--gold-dim); }
    .cap-track { height: 3px; background: rgba(255,255,255,0.04); }
    .cap-fill { height: 100%; background: linear-gradient(to right, var(--gold-dim), var(--gold), var(--gold-bright)); box-shadow: 0 0 10px var(--gold-glow), 0 0 20px rgba(200,168,75,0.12); transition: width 1s cubic-bezier(0.4,0,0.2,1); }
    .cap-fill.warn { background: linear-gradient(to right, #b86030, #d88050); }
    .cap-fill.full { background: linear-gradient(to right, #7a2828, #b03838); }

    /* ── ROSTER ── */
    .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2px; }

    .roster-card { background: var(--black-card); border: 1px solid var(--border-dim); overflow: hidden; position: relative; aspect-ratio: 3/4; cursor: pointer; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), box-shadow 0.4s, border-color 0.4s; animation: fadeUp 0.6s ease both; }
    .roster-card:nth-child(3n)   { border-top-color: rgba(91,200,245,0.2); }
    .roster-card:nth-child(3n+1) { border-top-color: rgba(195,168,232,0.2); }
    .roster-card:nth-child(3n+2) { border-top-color: rgba(200,168,75,0.2); }
    @media (hover: hover) { .roster-card:hover { transform: translateY(-6px) scale(1.015); box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 32px var(--gold-glow); border-color: var(--gold-dim); z-index: 2; } }
    .roster-card img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.8) contrast(1.08) saturate(0.85); transition: filter 0.4s; }
    @media (hover: hover) { .roster-card:hover img { filter: brightness(0.95) contrast(1.06) saturate(1); } }

    .no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, var(--black-card) 0%, var(--black-raise) 100%); }
    .no-photo-initial { font-family: 'Cormorant', serif; font-size: 5.5rem; font-weight: 300; font-style: italic; color: var(--gold-dim); opacity: 0.35; line-height: 1; }

    .roster-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 4rem 1.4rem 1.4rem; background: linear-gradient(to top, rgba(6,5,4,0.97) 0%, rgba(6,5,4,0.65) 50%, transparent 100%); }
    .roster-name { font-family: 'Cormorant', serif; font-size: 1.4rem; font-weight: 400; font-style: italic; letter-spacing: 0.04em; color: var(--cream); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .roster-role-tag { display: inline-block; margin-top: 0.45rem; font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.28rem 0.75rem; border: 1px solid var(--gold-dim); color: var(--gold); }
    .roster-bio-hint { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-dim); margin-top: 0.6rem; opacity: 0.88; transition: opacity 0.2s; }
    @media (hover: hover) { .roster-card:hover .roster-bio-hint { opacity: 1; } }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(6,5,4,0.92); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-backdrop.open { display: flex; animation: fadeUp 0.3s ease both; }

    .modal {
      background: var(--black-card); border: 1px solid var(--border);
      max-width: 780px; width: 100%;
      max-height: 92vh; position: relative;
      border-radius: 2px;
      display: flex; flex-direction: column;
    }
    #modalInner { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y; }

    /* Big bold X — always visible, top right, touch-friendly */
    .modal-close {
      position: absolute; top: 0.8rem; right: 0.8rem;
      z-index: 20;
      width: 3.2rem; height: 3.2rem;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700;
      color: var(--cream);
      background: rgba(6,5,4,0.85);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      line-height: 1;
      transform: translateZ(0);
    }
    .modal-close:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--black);
    }
    .modal-return-row {
      display: flex; justify-content: center;
      padding: 1.2rem 1.5rem 1.8rem;
      border-top: 1px solid var(--border-dim);
    }
    .modal-return-btn {
      font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold-dim); background: transparent;
      border: 1px solid var(--border); padding: 0.6rem 1.6rem;
      cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .modal-return-btn:hover { color: var(--gold); border-color: var(--gold-dim); background: rgba(195,168,75,0.06); }

    .modal-photos { display: grid; grid-template-columns: 2fr 1fr; gap: 2px; }
    .modal-photo-primary { aspect-ratio: 3/4; overflow: hidden; position: relative; }
    .modal-photo-primary img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-photo-secondary { display: flex; flex-direction: column; gap: 2px; height: 100%; }
    .modal-photo-secondary .sec-thumb { flex: 1; overflow: hidden; position: relative; }
    .modal-photo-secondary .sec-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-photo-secondary .sec-thumb.empty { background: var(--black-raise); display: flex; align-items: center; justify-content: center; }
    .modal-photo-secondary .sec-empty-icon { font-family: 'Cormorant', serif; font-size: 1.5rem; font-style: italic; color: var(--gold-dim); opacity: 0.2; }
    .modal-photo-secondary .sec-thumb img { cursor: zoom-in; }

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; display: block; }
    .lightbox-close { position: absolute; top: 1rem; right: 1rem; font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: .18em; text-transform: uppercase; background: rgba(6,5,4,0.85); border: 1px solid var(--border-dim); color: var(--muted); padding: .5rem 1rem; cursor: pointer; transition: color .2s, border-color .2s; }
    .lightbox-close:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ANNOUNCEMENT BANNER */
    .announce-banner { margin-bottom: 2.5rem; border: 1px solid var(--border); background: var(--black-card); overflow: hidden; }
    .announce-header { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: .3em; text-transform: uppercase; color: var(--gold-dim); padding: .9rem 1.8rem .6rem; border-bottom: 1px solid var(--border-dim); }
    .announce-body { padding: 1.4rem 1.8rem; }
    .announce-text { font-family: 'Cormorant', serif; font-size: 1.15rem; font-weight: 300; font-style: italic; line-height: 1.85; color: var(--cream); opacity: .96; white-space: pre-wrap; }
    .announce-img { width: 100%; display: block; margin-top: 1.2rem; }
    /* Admin announcement upload slot */
    /* Admin announcement 4-slot image grid */
    .ann-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: .5rem; }
    .ann-grid-slot { aspect-ratio: 4/3; background: var(--black-card); border: 1px dashed var(--border); position: relative; overflow: hidden; transition: border-color .3s; }
    .ann-grid-slot:hover { border-color: var(--gold-dim); }
    .ann-grid-slot-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .4rem; cursor: pointer; }
    .ann-grid-slot img.ann-grid-preview { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .ann-grid-slot .slot-remove { position: absolute; top: .3rem; right: .3rem; z-index: 10; font-family: 'Cinzel', serif; font-size: .75rem; letter-spacing: .15em; background: rgba(6,5,4,0.85); border: 1px solid var(--border-dim); color: var(--muted); padding: .25rem .5rem; cursor: pointer; transition: color .2s, border-color .2s; }
    .ann-grid-slot .slot-remove:hover { color: var(--gold); border-color: var(--gold-dim); }
    /* Announcement image grid in roster */
    .announce-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 1.2rem; }
    .announce-imgs img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: zoom-in; }
    /* PrEP toggle */
    .prep-picker { display: flex; gap: 1rem; }
    .modal-no-photo { grid-column: 1/-1; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, var(--black-card), var(--black-raise)); }
    .modal-info { padding: 1.5rem 2rem 2.5rem; }
    .modal-name { font-family: 'Cormorant', serif; font-size: 2.2rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1; margin-bottom: 0.3rem; }
    .modal-role { display: inline-block; margin-bottom: 1rem; font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; padding: 0.3rem 0.8rem; border: 1px solid var(--gold-dim); color: var(--gold); }
    .modal-bio-label { font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.6rem; }
    .modal-bio { font-family: 'Cormorant', serif; font-size: 1.1rem; font-weight: 300; font-style: italic; line-height: 1.8; color: var(--cream); opacity: 0.94; }
    .modal-divider { border: none; border-top: 1px solid var(--border-dim); margin: 1.5rem 0; }

    /* ── CHAT ── */
    .chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 260px); min-height: 420px; max-width: 780px; margin: 0 auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem 0; display: flex; flex-direction: column; gap: 0; scrollbar-width: thin; scrollbar-color: var(--border-dim) transparent; }
    .chat-msg { padding: 1.2rem 0; border-bottom: 1px solid var(--border-dim); animation: fadeUp 0.25s ease both; }
    .chat-msg:last-child { border-bottom: none; }
    .chat-msg-mine { background: rgba(200,168,75,0.03); padding: 1.2rem 1rem; border-bottom: 1px solid var(--border-dim); margin: 0 -1rem; }
    .chat-msg-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.4rem; }
    .chat-msg-name { font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); }
    .chat-msg-name.mine { color: var(--gold-bright); }
    .chat-msg-time { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.16em; color: var(--muted2); }
    .chat-msg-del { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.12em; background: none; border: none; color: var(--muted2); cursor: pointer; margin-left: auto; transition: color .2s; padding: 0.2rem 0.4rem; }
    .chat-msg-del:hover { color: #cc7070; }
    .chat-msg-body { font-family: 'Cormorant', serif; font-size: 1.2rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1.65; opacity: 0.96; }
    .chat-msg-row { display: flex; gap: 0.75rem; align-items: flex-start; }
    .chat-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin-top: 0.1rem; border: 1px solid var(--border-dim); }
    .chat-avatar-ph { width: 26px; height: 26px; border-radius: 50%; background: var(--black-raise); border: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.05em; color: var(--muted); flex-shrink: 0; margin-top: 0.1rem; }
    .chat-msg-content { flex: 1; min-width: 0; }
    .chat-empty { font-family: 'Cormorant', serif; font-size: 1.1rem; font-style: italic; color: rgba(180,168,148,0.5); text-align: center; padding: 4rem 2rem; }
    .chat-input-wrap { border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; gap: 0.8rem; align-items: flex-end; }
    .chat-input { flex: 1; font-family: 'Cormorant', serif; font-size: 1.1rem; font-weight: 300; font-style: italic; letter-spacing: 0.04em; background: var(--black-card); border: 1px solid var(--border); padding: 1rem 1.2rem; color: var(--cream); outline: none; resize: none; transition: border-color .3s, box-shadow .3s; min-height: 52px; max-height: 140px; -webkit-appearance: none; }
    .chat-input:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 1px rgba(200,168,75,0.12), 0 0 28px var(--gold-glow2); }
    .chat-send { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: .28em; text-transform: uppercase; padding: 1rem 1.8rem; border: 1px solid var(--gold-dim); background: transparent; color: var(--gold-light); cursor: pointer; transition: all .3s; white-space: nowrap; flex-shrink: 0; }
    .chat-send:hover { border-color: var(--gold); box-shadow: 0 0 32px var(--gold-glow); }
    .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }
    .chat-gate { font-family: 'Cormorant', serif; font-size: 1.1rem; font-style: italic; color: var(--muted); text-align: center; padding: 4rem 2rem; border: 1px solid var(--border-dim); }
    @media (max-width: 700px) {
      .chat-wrap { height: calc(100vh - 200px); }
      .chat-msg-body { font-size: 1.1rem; }
      .chat-send { padding: 0.9rem 1.2rem; font-size: 0.78rem; letter-spacing: .18em; }
    }

    /* ── INFO / FAQ ── */
    .info-wrap { max-width: 640px; margin: 0 auto; }
    .info-intro { text-align: center; margin-bottom: 4rem; padding-bottom: 3rem; border-bottom: 1px solid var(--border-dim); }
    .info-intro-tag { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.38em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 1.6rem; }
    .info-intro-line { font-family: 'Cormorant', serif; font-size: 1.35rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1.7; opacity: 0.95; }
    .info-section { margin-bottom: 3.5rem; }
    .info-title { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.4rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border-dim); }
    .info-body { font-family: 'Cormorant', serif; font-size: 1.15rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1.85; opacity: 0.95; }
    .info-body p { margin-bottom: 0.8rem; }
    .info-body p:last-child { margin-bottom: 0; }
    .info-body strong { font-weight: 400; font-style: normal; color: var(--gold-light); opacity: 1; }
    .info-list { list-style: none; padding: 0; margin: 0.8rem 0 0; }
    .info-list li { font-family: 'Cormorant', serif; font-size: 1.15rem; font-weight: 300; font-style: italic; color: var(--cream); opacity: 0.95; padding: 0.3rem 0 0.3rem 1.4rem; position: relative; line-height: 1.6; }
    .info-list li::before { content: '·'; position: absolute; left: 0; color: var(--gold-dim); font-style: normal; }
    .info-sub { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-dim); margin: 1.4rem 0 0.5rem; }
    .info-divider { border: none; border-top: 1px solid rgba(200,168,75,0.18); margin: 3rem 0; }
    @media (max-width: 700px) {
      .info-intro-line { font-size: 1.15rem; }
      .info-body, .info-list li { font-size: 1.1rem; }
    }

    /* ── FORMS ── */
    .form-wrap { max-width: 600px; margin: 0 auto; }
    .form-title { font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 0.6rem; background: linear-gradient(135deg, var(--gold-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .form-sub { font-family: 'Cormorant', serif; font-size: 1rem; font-style: italic; font-weight: 300; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3.5rem; }
    .form-group { margin-bottom: 2.2rem; }

    label { display: block; font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.7rem; }
    label .req { color: var(--gold); margin-left: 0.2rem; }

    input[type="text"], input[type="password"], input[type="number"], textarea {
      width: 100%; font-family: 'Cormorant', serif; font-size: 1.1rem; font-weight: 300; letter-spacing: 0.05em;
      background: var(--black-card); border: 1px solid var(--border); padding: 1rem 1.2rem; color: var(--cream); outline: none;
      transition: border-color 0.3s, box-shadow 0.3s; -webkit-appearance: none;
    }
    input:focus, textarea:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 1px rgba(200,168,75,0.15), 0 0 28px var(--gold-glow2); }
    textarea { resize: vertical; min-height: 100px; }

    /* PHOTO SLOTS */
    .photo-slots { display: grid; grid-template-columns: 2fr 1fr; gap: 2px; margin-bottom: 0.8rem; }
    .photo-slot { background: var(--black-card); border: 1px dashed var(--border); position: relative; cursor: pointer; overflow: hidden; transition: border-color 0.3s, background 0.3s; }
    .photo-slot:hover { border-color: var(--gold-dim); background: rgba(200,168,75,0.04); }
    .photo-slot.drag-over { border-color: var(--gold); background: rgba(200,168,75,0.07); }
    .photo-slot input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .slot-primary { aspect-ratio: 3/4; }
    .slot-secondary-col { display: flex; flex-direction: column; gap: 2px; }
    .slot-secondary { flex: 1; }
    .slot-inner { width: 100%; height: 100%; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; padding: 1rem; }
    .slot-icon { font-family: 'Cormorant', serif; font-size: 1.8rem; font-style: italic; color: var(--gold-dim); opacity: 0.3; }
    .slot-label { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-align: center; }
    .slot-preview { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slot-remove { position: absolute; top: 0.4rem; right: 0.4rem; z-index: 10; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.15em; background: rgba(6,5,4,0.8); border: 1px solid var(--border-dim); color: var(--muted); padding: 0.25rem 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .slot-remove:hover { color: var(--gold); border-color: var(--gold-dim); }
    .photo-rule-note { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.3rem; }
    .photo-hint-note { font-family: 'Cormorant', serif; font-size: 1rem; font-style: italic; color: var(--muted); }

    /* VIBE */
    .vibe-picker { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .vibe-btn { display: flex; align-items: center; gap: 0.9rem; font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; padding: 1rem 1.6rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.3s; }
    .vibe-symbol { font-size: 1.6rem; line-height: 1; font-family: 'Cormorant', serif; font-style: normal; }
    .vibe-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .vibe-btn[data-vibe="up"]:hover, .vibe-btn[data-vibe="up"].selected { border-color: #e05050; color: #e05050; box-shadow: 0 0 24px rgba(224,80,80,0.3), inset 0 0 20px rgba(224,80,80,0.04); }
    .vibe-btn[data-vibe="down"]:hover, .vibe-btn[data-vibe="down"].selected { border-color: #5bc8f5; color: var(--neon-blue); box-shadow: 0 0 24px var(--nb-glow), inset 0 0 20px rgba(91,200,245,0.04); }
    .vibe-btn[data-vibe="dash"]:hover, .vibe-btn[data-vibe="dash"].selected { border-color: #d4b84a; color: #d4b84a; box-shadow: 0 0 24px rgba(212,184,74,0.3), inset 0 0 20px rgba(212,184,74,0.04); }
    /* PREP */
    .age-select { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.12em; background: var(--black-card); border: 1px solid var(--border); padding: 1rem 1.2rem; color: var(--cream); outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; width: 100%; max-width: 180px; transition: border-color 0.3s, box-shadow 0.3s; }
    .age-select:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 1px rgba(200,168,75,0.15), 0 0 28px var(--gold-glow2); }
    .age-select option { background: var(--black-card); color: var(--cream); }
    .age-wrap { position: relative; display: inline-block; }
    .age-wrap::after { content: '▾'; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--gold-dim); pointer-events: none; font-size: 0.8rem; }
    .prep-picker { display: flex; gap: 0.8rem; }
    .prep-btn { font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 400; letter-spacing: .22em; text-transform: uppercase; padding: 1rem 2rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.3s; }
    .prep-btn.selected { border-color: var(--gold); color: var(--gold-light); box-shadow: 0 0 24px var(--gold-glow), inset 0 0 20px var(--gold-glow2); }

    /* BUTTONS */
    .btn { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; padding: 1.2rem 3rem; border: 1px solid var(--gold-dim); background: transparent; color: var(--gold-light); cursor: pointer; transition: all 0.35s; }
    .btn:hover { border-color: var(--gold); box-shadow: 0 0 32px var(--gold-glow); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-solid { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--black); border-color: var(--gold); font-weight: 600; }
    .btn-solid:hover { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 40px var(--gold-glow); }
    .btn-blue { border-color: var(--border); color: var(--gold-light); }
    .btn-blue:hover { border-color: var(--gold); box-shadow: 0 0 24px var(--gold-glow); }
    .btn-danger { border-color: rgba(180,60,60,0.4); color: #cc7070; }
    .btn-danger:hover { border-color: #b04040; }
    .btn-sm { padding: 0.65rem 1.3rem; font-size: 0.78rem; }
    .btn-ghost { border-color: var(--border-dim); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--gold-dim); }

    .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; }

    /* MESSAGES */
    .msg { font-family: 'Cormorant', serif; font-size: 1.1rem; font-weight: 300; font-style: italic; letter-spacing: 0.04em; padding: 1.1rem 1.4rem; border-left: 2px solid; margin-bottom: 2rem; }
    .msg-success { border-color: #4a7c59; background: rgba(74,124,89,0.07); color: #8ad4a0; }
    .msg-error   { border-color: #8b3030; background: rgba(139,48,48,0.07); color: #cc8080; }
    .msg-info    { border-color: var(--gold-dim); background: var(--gold-glow2); color: var(--gold-light); }

    /* PIN DISPLAY */
    .pin-display {
      text-align: center; padding: 3rem; border: 1px solid var(--border); background: var(--black-card); margin: 2rem 0;
    }
    .pin-number {
      font-family: 'Cinzel', serif; font-size: 4rem; font-weight: 700; letter-spacing: 0.5em;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 20px rgba(200,168,75,0.4));
      margin-bottom: 0.5rem;
    }
    .pin-label { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }
    .pin-warning { font-family: 'Cormorant', serif; font-size: 0.95rem; font-style: italic; color: var(--gold-dim); margin-top: 1rem; }

    /* PIN INPUT */
    .pin-input-wrap { display: flex; gap: 0.5rem; justify-content: center; margin: 1.5rem 0; }
    .pin-digit {
      width: 3rem; height: 4rem;
      font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 600;
      text-align: center; letter-spacing: 0;
      background: var(--black-card); border: 1px solid var(--border);
      color: var(--gold-light); outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .pin-digit:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 1px rgba(200,168,75,0.15), 0 0 20px var(--gold-glow2); }

    /* ADMIN */
    .admin-login-wrap { max-width: 380px; margin: 2rem auto; }
    .section-label { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-dim); border-bottom: 1px solid var(--border-dim); padding-bottom: 0.7rem; margin-bottom: 1.8rem; }
    .pending-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3.5rem; }
    .pending-item { display: flex; flex-direction: column; gap: 1rem; background: var(--black-card); border: 1px solid var(--border-dim); padding: 1.4rem; }
    .p-header { display: flex; align-items: center; gap: 1rem; }
    .p-thumb { width: 56px; height: 56px; object-fit: cover; border: 1px solid var(--border-dim); flex-shrink: 0; }
    .p-thumb-ph { width: 56px; height: 56px; flex-shrink: 0; background: var(--black-raise); border: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant', serif; font-size: 1.5rem; font-style: italic; color: var(--gold-dim); }
    .p-info { flex: 1; }
    .p-name { font-family: 'Cormorant', serif; font-size: 1.2rem; font-weight: 400; font-style: italic; color: var(--cream); }
    .p-meta { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.14em; color: var(--muted); margin-top: 0.3rem; }
    .p-photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 4px; }
    .p-photo-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: zoom-in; border: 1px solid var(--border-dim); }
    .p-section { display: flex; flex-direction: column; gap: 0.3rem; }
    .p-label { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-dim); }
    .p-value { font-family: 'Cormorant', serif; font-size: 1rem; font-style: italic; color: var(--cream); opacity: 0.95; }
    .p-details-row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .p-bio { font-family: 'Cormorant', serif; font-size: 1rem; font-style: italic; color: var(--cream); opacity: 0.92; line-height: 1.55; }
    .p-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .approved-list { display: flex; flex-direction: column; gap: 2px; }
    .approved-item { display: flex; align-items: center; gap: 1.2rem; background: var(--black-card); border: 1px solid var(--border-dim); padding: 0.8rem 1.4rem; flex-wrap: wrap; }
    .a-name { flex: 1; font-family: 'Cormorant', serif; font-size: 1rem; font-weight: 300; font-style: italic; color: var(--cream); }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem 4rem; max-width: 580px; margin-bottom: 2.5rem; }
    hr.div { border: none; border-top: 1px solid var(--border-dim); margin: 3.5rem 0; }
    .empty-state { font-family: 'Cormorant', serif; font-size: 1rem; font-style: italic; font-weight: 300; color: rgba(180,168,148,0.5); text-align: center; padding: 3.5rem; border: 1px solid var(--border-dim); }
    .full-overlay { text-align: center; padding: 6rem 2rem; border: 1px solid var(--border); background: var(--black-card); }
    .full-title { font-family: 'Cinzel', serif; font-size: 2.5rem; font-weight: 700; color: var(--gold); margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(200,168,75,0.3)); }
    .full-sub { font-family: 'Cormorant', serif; font-size: 1.1rem; font-style: italic; font-weight: 300; color: var(--muted); }

    /* SESSION INDICATOR */
    .session-bar { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200; display: flex; align-items: center; gap: 0.8rem; background: var(--black-card); border: 1px solid var(--border-dim); padding: 0.7rem 1.2rem; }
    .session-fire-badge { font-family: 'Cormorant', serif; font-size: 0.85rem; color: #e05050; opacity: 0.9; letter-spacing: 0.04em; white-space: nowrap; }
    .fire-toast { position: fixed; bottom: 5.5rem; right: 1.5rem; z-index: 210; background: var(--black-card); border: 1px solid rgba(224,80,80,0.35); padding: 0.65rem 1rem 0.65rem 1.1rem; display: flex; align-items: center; gap: 0.7rem; max-width: 260px; animation: fireToastIn 0.35s ease; }
    @keyframes fireToastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fire-toast-text { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--cream); line-height: 1.45; }
    .fire-toast-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 0.1rem; flex-shrink: 0; transition: color 0.2s; }
    .fire-toast-dismiss:hover { color: var(--cream); }
    .session-name { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); }
    .session-btn { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; background: none; border: none; color: var(--muted); cursor: pointer; transition: color 0.2s; padding: 0.2rem 0; }
    .session-btn:hover { color: var(--gold); }

    @media (max-width: 700px) {
      /* Layout */
      main { padding: 1.5rem 1rem; }
      .hero { padding: 3.5rem 1.2rem 2.5rem; }
      .hero-title { font-size: 2.8rem; letter-spacing: 0.06em; }
      .hero-sub { font-size: 1rem; }
      .orn-line { width: 60px; }

      /* Nav */
      nav { justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      nav::-webkit-scrollbar { display: none; }
      nav button { padding: 1rem 0.85rem; font-size: 0.78rem; letter-spacing: 0.14em; white-space: nowrap; flex-shrink: 0; }

      /* Stats */
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stat { padding: 1.2rem 1rem; }
      .stat-num { font-size: 2.8rem; }

      /* Admin */
      .settings-grid { grid-template-columns: 1fr; }

      /* Modal — full screen on mobile */
      .modal-backdrop { padding: 0; align-items: flex-end; }
      .modal {
        max-height: 95vh; border-bottom: none;
        border-left: none; border-right: none;
        border-radius: 0;
      }
      .modal-photos { grid-template-columns: 1fr; }
      .modal-photo-primary { aspect-ratio: 4/3; }
      .modal-photo-secondary { flex-direction: row; height: 120px; }
      .modal-photo-secondary .sec-thumb { height: 120px; }
      .modal-info { padding: 1.2rem 1.2rem 2rem; }
      .modal-name { font-size: 1.8rem; }
      .modal-close { width: 2.8rem; height: 2.8rem; font-size: 1rem; }

      /* Forms */
      .form-wrap { padding: 0; }
      .form-title { font-size: 1.8rem; }
      .form-sub { font-size: 1.05rem; }
      label { font-size: 0.78rem; letter-spacing: 0.18em; }
      input[type="text"], input[type="password"], input[type="number"], textarea { font-size: 1.15rem; padding: 0.9rem 1rem; }
      .pin-digit { width: 2.4rem; height: 3.2rem; font-size: 1.2rem; }
      .vibe-btn { padding: 0.85rem 1.4rem; font-size: 0.9rem; }
      .prep-btn { padding: 0.85rem 1.8rem; font-size: 0.9rem; }
      .btn { font-size: 0.78rem; padding: 1.1rem 2rem; }
      .photo-rule-note { font-size: 0.72rem; }
      .photo-hint-note { font-size: 1.05rem; }
      .slot-label { font-size: 0.78rem; }
      .pin-warning { font-size: 1rem; }
      .modal-bio-label { font-size: 0.78rem; }
      .modal-role { font-size: 0.78rem; }

      /* Roster */
      .roster-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 2px; }
      .roster-name { font-size: 1.1rem; }

      /* Session bar */
      .session-bar { bottom: 0; right: 0; left: 0; border-left: none; border-right: none; border-bottom: none; justify-content: center; padding: 0.8rem 1rem; }


      /* Pending items in admin */
      .p-photo-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .p-details-row { gap: 1.2rem; }

      /* Photo slots */
      .photo-slots { grid-template-columns: 1fr; }
      .slot-primary { aspect-ratio: 4/3; }
      .slot-secondary-col { flex-direction: row; height: 120px; }
    }

    @media (min-width: 701px) and (max-width: 1024px) {
      main { padding: 3rem 2rem; }
      .roster-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      nav button { padding: 1.3rem 2rem; }
    }

    .vibe-caption { font-family:'Cormorant',serif; font-size:0.88rem; font-style:italic; color:var(--muted); margin-top:0.6rem; letter-spacing:0.04em; transition:color 0.3s; }
    @keyframes capFlash { 0%,100% { color:var(--muted); } 40% { color:var(--gold-light); } }
    .vibe-cap-flash { animation: capFlash 0.75s ease; }

    /* ── SOCIAL INTERACTIONS ── */
    .card-indicator { position:absolute; top:0.5rem; right:0.5rem; z-index:4; font-size:0.9rem; line-height:1; pointer-events:none; }
    .ci-fire  { filter:drop-shadow(0 0 5px rgba(224,80,80,0.9)); }
    .ci-saved { filter:drop-shadow(0 0 4px rgba(200,168,75,0.8)); }
    .roster-card.mutual-fire-card { box-shadow:0 0 0 1px rgba(224,80,80,0.3), 0 0 28px rgba(224,80,80,0.1); }

    .modal-interact { border-top:1px solid var(--border-dim); padding:1.5rem; }
    .mutual-reveal { font-family:'Cormorant',serif; font-size:1.05rem; font-style:italic; color:#e05050; text-align:center; letter-spacing:0.06em; padding-bottom:1rem; animation:fadeUp 0.4s ease; }
    .modal-interact-btns { display:flex; gap:0.7rem; align-items:stretch; }

function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Safe HTML escape
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══ STATE ══════════════════════════════════════════════════════════
let adminIn      = false;
let currentGuest = null; // { id, name, pin } of logged-in guest
let isPreview    = false; // true if logged in with shared guest PIN

let selectedVibes = [];
let selectedPrep  = null;

let activeVibeFilter = null;

// ══ SOCIAL ═════════════════════════════════════════════════════════
async function loadSocialData() {
  const { data } = await sb.from('config').select('value').eq('key','social').single();
  if (data?.value) {
    try {
      const p = JSON.parse(data.value);
      socialData.fires = p.fires || {};
      socialData.saved = p.saved || {};
    } catch(e) {}
  }
}

async function saveSocialData() {
  await sb.from('config').upsert({ key:'social', value:JSON.stringify(socialData) }, { onConflict:'key' });
}

function firesReceivedCount() {
  if (!currentGuest) return 0;
  return Object.values(socialData.fires).filter(arr => arr.includes(currentGuest.id)).length;
}

function updateFireBadge() {
  const badge = document.getElementById('sessionFireBadge');
  if (!badge || !currentGuest) return;
  const n = firesReceivedCount();
  if (n > 0) {
    badge.textContent = '🔥 ' + n;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function showFireToast() {
  if (!currentGuest || isPreview) return;
  const n = firesReceivedCount();
  if (!n) return;
  const key = 'elysium_fire_toast_' + currentGuest.id;
  const seen = sessionStorage.getItem(key);
  if (seen === String(n)) return; // already shown for this count this session
  sessionStorage.setItem(key, String(n));
  const existing = document.getElementById('fireToast');
  if (existing) existing.remove();
  const msg = n === 1 ? 'Someone fav\'d you' : n + '\u00a0people fav\'d you';
  const toast = document.createElement('div');
  toast.className = 'fire-toast'; toast.id = 'fireToast';
  toast.innerHTML = `<span class="fire-toast-text">🔥 ${msg}</span><button class="fire-toast-dismiss" onclick="document.getElementById('fireToast')?.remove()">✕</button>`;
  document.body.appendChild(toast);
  setTimeout(() => { document.getElementById('fireToast')?.remove(); }, 7000);
}

function isFired(id)      { return !!currentGuest && (socialData.fires[currentGuest.id]||[]).includes(id); }
function isMutualFire(id) { return isFired(id) && (socialData.fires[id]||[]).includes(currentGuest.id); }
function isSaved(id)      { return !!currentGuest && (socialData.saved[currentGuest.id]||[]).includes(id); }

async function toggleFire(id) {
  if (!currentGuest || isPreview) return;
  const list = socialData.fires[currentGuest.id] || [];
  socialData.fires[currentGuest.id] = list.includes(id) ? list.filter(x=>x!==id) : [...list, id];
  await saveSocialData();
  refreshModalInteract(id);
  applyRosterIndicators();
}

async function toggleSave(id) {
  if (!currentGuest || isPreview) return;
  const list = socialData.saved[currentGuest.id] || [];
  socialData.saved[currentGuest.id] = list.includes(id) ? list.filter(x=>x!==id) : [...list, id];
  await saveSocialData();
  refreshModalInteract(id);
  applyRosterIndicators();
}

function refreshModalInteract(id) {
  const interact = document.getElementById('modalInteract');
  if (!interact) return;
  const mutual = isMutualFire(id);
  interact.innerHTML = modalInteractHTML(id);
  document.getElementById('modalBox')?.classList.toggle('mutual-glow', mutual);
}

function modalInteractHTML(id) {
  const fired  = isFired(id);
  const mutual = isMutualFire(id);
  const saved  = isSaved(id);
  return `
    ${mutual ? `<div class="mutual-reveal">🔥 Mutual — you're both in</div>` : ''}
    <div class="modal-interact-btns">
      <button class="modal-fire-btn${fired?' fired':''}${mutual?' mutual':''}" onclick="toggleFire('${id}')">
        <span class="fire-icon">🔥</span>
        <span>${mutual ? 'Matched' : fired ? 'Fired' : 'Fire'}</span>
      </button>
      <button class="modal-save-btn${saved?' saved':''}" onclick="toggleSave('${id}')" title="${saved?'Remove from saved':'Save'}">
        ${saved ? '★' : '☆'}
      </button>
    </div>
    ${!mutual ? `<div class="interact-hint">Interest sent privately · only reveals if mutual &ensp;·&ensp; ☆ bookmark for yourself</div>` : ''}`;
}

function applyRosterIndicators() {
  if (!currentGuest || isPreview) return;
  document.querySelectorAll('.roster-card[data-guest-id]').forEach(card => {
    const gid    = card.dataset.guestId;
    const mutual = isMutualFire(gid);
    const saved  = isSaved(gid);
    card.classList.toggle('mutual-fire-card', mutual);
    card.querySelector('.card-indicator')?.remove();
    if (mutual || saved) {
      const ind = document.createElement('div');
      ind.className = 'card-indicator ' + (mutual ? 'ci-fire' : 'ci-saved');
      ind.textContent = mutual ? '🔥' : '★';
      card.appendChild(ind);
    }
  });
}

async function renderConnections(container) {
  if (!currentGuest) return;
  const myFires  = socialData.fires[currentGuest.id] || [];
  const mySaved  = socialData.saved[currentGuest.id] || [];
  const mutualIds = myFires.filter(id => (socialData.fires[id]||[]).includes(currentGuest.id));
  if (!mutualIds.length && !mySaved.length) return;

  const allIds = [...new Set([...mutualIds, ...mySaved])];
  const { data: guests } = await sb.from('guests').select('id,name,photos').in('id', allIds);
  const gMap = {};
  (guests||[]).forEach(g => { gMap[g.id] = g; });

  function miniCard(g) {
    if (!g) return '';
    const thumb = g.photos&&g.photos[0] ? g.photos[0] : null;
    return `<div class="connections-card" onclick="openModal('${g.id}')">
      ${thumb ? `<img src="${thumb}" alt="" loading="lazy" />` : `<div class="connections-card-initial">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
      <div class="connections-card-name">${esc(g.name)}</div>
    </div>`;
  }

  let html = `<div class="connections-section">`;
  if (mutualIds.length) {
    html += `<div class="connections-subsection"><div class="connections-label">🔥 Mutual</div>
      <div class="connections-mini-grid">${mutualIds.map(id=>miniCard(gMap[id])).join('')}</div></div>`;
  }
  if (mySaved.length) {
    html += `<div class="connections-subsection"><div class="connections-label">★ Saved</div>
      <div class="connections-mini-grid">${mySaved.map(id=>miniCard(gMap[id])).join('')}</div></div>`;
  }
  html += `</div>`;
  container.insertAdjacentHTML('beforeend', html);
}

// ══ DOOR CHECK-IN ══════════════════════════════════════════════════
async function loadCheckins() {
  const { data } = await sb.from('config').select('value').eq('key','door_checkins').single();
  if (data?.value) { try { doorCheckins = JSON.parse(data.value); } catch(e) { doorCheckins = {}; } }
}

async function saveCheckins() {
  await sb.from('config').upsert({ key:'door_checkins', value:JSON.stringify(doorCheckins) }, { onConflict:'key' });
}

async function toggleCheckin(id) {
  if (doorCheckins[id]) { delete doorCheckins[id]; } else { doorCheckins[id] = new Date().toISOString(); }
  await saveCheckins();
  const row = document.querySelector(`.door-guest-row[data-id="${id}"]`);
  const btn = document.querySelector(`.door-checkin-btn[data-id="${id}"]`);
  if (row && btn) {
    const arrived = !!doorCheckins[id];
    row.classList.toggle('arrived', arrived);
    btn.classList.toggle('arrived', arrived);
    btn.textContent = arrived ? '✓ Here' : 'Check In';
    updateDoorStats();
  }
}

function updateDoorStats() {
  const total    = document.querySelectorAll('.door-guest-row').length;
  const arrivedN = Object.keys(doorCheckins).length;
  const hereEl   = document.getElementById('doorHere');
  const notYetEl = document.getElementById('doorNotYet');
  if (hereEl)   hereEl.textContent   = arrivedN;
  if (notYetEl) notYetEl.textContent = Math.max(0, total - arrivedN);
}

async function resetCheckins() {
  if (!window.confirm('Reset all check-ins for this event?')) return;
  doorCheckins = {};
  await saveCheckins();
  renderDoor();
}

async function renderDoor() {
  if (!adminIn) return;
  const el = document.getElementById('doorContent');
  el.innerHTML = `<div class="empty-state">Loading…</div>`;
  await loadCheckins();
  const { data: guests, error } = await sb.from('guests').select('*').eq('status','approved').order('name');
  if (error || !guests || !guests.length) {
    el.innerHTML = `<div class="empty-state">No approved guests yet.</div>`; return;
  }
  const arrivedCount = guests.filter(g => doorCheckins[g.id]).length;
  const sorted = [...guests].sort((a,b) => {
    const ai = !!doorCheckins[a.id], bi = !!doorCheckins[b.id];
    if (ai === bi) return (a.name||'').localeCompare(b.name||'');
    return ai ? 1 : -1;
  });
  const vibeMap = {up:'#e05050',down:'#5bc8f5',dash:'#d4b84a'};
  const symMap  = {up:'↑',down:'↓',dash:'—'};
  el.innerHTML = `
    <div class="door-stats">
      <div class="door-stat-cell">
        <div class="door-stat-val arrived-col" id="doorHere">${arrivedCount}</div>
        <div class="stat-label">Here</div>
      </div>
      <div class="door-stat-cell">
        <div class="door-stat-val pending-col" id="doorNotYet">${guests.length - arrivedCount}</div>
        <div class="stat-label">Not Yet</div>
      </div>
      <div class="door-stat-cell">
        <div class="door-stat-val dim">${guests.length}</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    <div class="door-guest-list">
      ${sorted.map(g => {
        const thumb   = g.photos&&g.photos[0] ? g.photos[0] : null;
        const arrived = !!doorCheckins[g.id];
        const vibes   = g.vibes || [];
        const vStr    = vibes.map(v=>`<span style="color:${vibeMap[v]||'#888'}">${symMap[v]||v}</span>`).join(' ');
        return `
        <div class="door-guest-row${arrived?' arrived':''}" data-id="${g.id}">
          ${thumb ? `<img class="p-thumb" src="${thumb}" alt="" />` : `<div class="p-thumb-ph">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
          <div class="door-guest-info">
            <div class="door-guest-name">${esc(g.name)}</div>
            <div class="door-guest-meta">${esc(g.role||'')}${vStr?' &ensp;'+vStr:''}</div>
          </div>
          <button class="door-checkin-btn${arrived?' arrived':''}" data-id="${g.id}" onclick="toggleCheckin('${g.id}')">
            ${arrived ? '✓ Here' : 'Check In'}
          </button>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:2.5rem;text-align:center;">
      <button class="btn btn-ghost" onclick="resetCheckins()">Reset All Check-ins</button>
    </div>`;
}

// ══ VIBE FILTER ════════════════════════════════════════════════════
function getFilteredGuests() {
  if (!activeVibeFilter) return allGuests;
  if (activeVibeFilter === 'verse') {
    return allGuests.filter(g => {
      const v = g.vibes || [];
      return v.includes('up') && v.includes('down');
    });
  }
  return allGuests.filter(g => (g.vibes || []).includes(activeVibeFilter));
}

function vibeFilterBarHTML() {
  const filtered = getFilteredGuests();
  const vibes = [{key:'up',sym:'↑'},{key:'down',sym:'↓'},{key:'verse',sym:'↕'},{key:'dash',sym:'—'}];
  return `<div class="vibe-filter" id="vibeFilterBar">
    ${vibes.map(v => `<button class="vibe-filter-btn${activeVibeFilter===v.key?' vf-'+v.key:''}" onclick="setVibeFilter('${v.key}')">${v.sym}</button>`).join('')}
    ${activeVibeFilter ? `<button class="vibe-filter-clear" onclick="setVibeFilter(null)">✕ clear</button>` : ''}
    <span class="vibe-filter-count">${filtered.length}${activeVibeFilter ? ` of ${allGuests.length}` : ' guests'}</span>
  </div>`;
}

function rosterCardsHTML(list) {
  if (!list.length) {
    return activeVibeFilter
      ? `<div class="empty-state">No guests with this vibe.</div>`
      : `<div class="empty-state">No confirmed guests yet — be among the first.</div>`;
  }
  return `<div class="roster-grid">${list.map((g,i) => {
    const photos = g.photos || [];
    const primary = photos[0] || null;
    const vibes = g.vibes || [];
    return `
    <div class="roster-card" data-guest-id="${g.id}" onclick="openModal('${g.id}')" style="animation-delay:${i*0.05}s">
      ${primary ? `<img src="${primary}" alt="" loading="lazy" />` : `<div class="no-photo"><div class="no-photo-initial">${esc((g.name||'?').charAt(0).toUpperCase())}</div></div>`}
      <div class="roster-overlay">
        <div class="roster-name">${esc(g.name)}</div>
        ${g.role ? `<div class="roster-role-tag">${esc(g.role)}</div>` : ''}
        ${vibes.length ? `<div style="margin-top:.45rem;display:flex;gap:.35rem;">
          ${vibes.map(v => {
            const map = {up:'#e05050',down:'#5bc8f5',dash:'#d4b84a'};
            const sym = {up:'↑',down:'↓',dash:'—'};
            return `<span style="font-family:'Cormorant',serif;font-size:1.4rem;line-height:1;color:${map[v]||'#888'};">${sym[v]||v}</span>`;
          }).join('')}
        </div>` : ''}
        ${(g.bio || photos.length > 1) ? `<div class="roster-bio-hint">Tap to view profile</div>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function setVibeFilter(vibe) {
  activeVibeFilter = (activeVibeFilter === vibe) ? null : vibe;
  const bar = document.getElementById('vibeFilterBar');
  if (bar) bar.outerHTML = vibeFilterBarHTML();
  const wrap = document.getElementById('rosterGridWrap');
  if (wrap) wrap.innerHTML = rosterCardsHTML(getFilteredGuests());
  applyRosterIndicators();
}

// ══ INIT ═══════════════════════════════════════════════════════════
async function loadConfig() {
  const { data, error } = await sb.from('config').select('key, value');
  if (!error && data) {
    data.forEach(row => {
      if (row.key === 'capacity')             CONFIG.capacity           = parseInt(row.value, 10) || 30;
      else if (row.key === 'waitlistEnabled')  CONFIG.waitlistEnabled  = row.value === 'true';
      else if (row.key === 'announcementImages') {
        try { CONFIG.announcementImages = JSON.parse(row.value) || []; } catch(e) { CONFIG.announcementImages = []; }
      }
      else if (row.key === 'eventDateISO')     CONFIG.eventDateISO = row.value;
      else if (row.key === 'eventPhase')       CONFIG.eventPhase   = row.value;
      else if (CONFIG.hasOwnProperty(row.key)) CONFIG[row.key] = row.value;
    });
  }
  document.getElementById('heroMeta').innerHTML = `${CONFIG.eventDate}&ensp;·&ensp;${CONFIG.eventLocation}`;
  startCountdown();
}

function startCountdown() {
  const el = document.getElementById('heroCountdown');
  const eventDate = CONFIG.eventDateISO ? new Date(CONFIG.eventDateISO) : null;
  if (!eventDate || isNaN(eventDate)) { el.style.display = 'none'; return; }
  const dEl = document.getElementById('cdDays');
  const hEl = document.getElementById('cdHours');
  function tick() {
    const diff = eventDate - Date.now();
    if (diff <= 0) { el.style.display='none'; return; }
    el.style.display='flex';
    const totalHours = Math.floor(diff / 36e5);
    dEl.textContent = String(Math.floor(totalHours / 24)).padStart(2,'0');
    hEl.textContent = String(totalHours % 24).padStart(2,'0');
  }
  tick();
  if (startCountdown._interval) clearInterval(startCountdown._interval);
  startCountdown._interval = setInterval(tick, 60000);
}

async function init() {
  await loadConfig();

  // Restore session from localStorage, validate guest still exists in DB
  const saved = localStorage.getItem('elysium_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.pin === CONFIG.guestPreviewPin) {
        isPreview = true; currentGuest = null;
        showSessionBar('Preview Guest');
      } else {
        const { data: g } = await sb.from('guests').select('id,name,pin').eq('id', s.id).single();
        if (g) {
          currentGuest = { id: g.id, name: g.name, pin: g.pin };
          localStorage.setItem('elysium_session', JSON.stringify(currentGuest));
          showSessionBar(g.name);
          await loadSocialData();
          updateFireBadge();
          showFireToast();
        } else {
          localStorage.removeItem('elysium_session');
        }
      }
    } catch {}
  }
  renderRoster();
  renderRsvp();
}

init();

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  else document.querySelector(`[onclick="showView('${name}',this)"]`)?.classList.add('active');
  if (name === 'roster')  renderRoster();
  if (name === 'rsvp')    renderRsvp();
  if (name === 'info')    renderInfo();

let chatChannel = null;

async function renderChat() {
  const el = document.getElementById('chatContent');

  if (!currentGuest || isPreview) {
    el.innerHTML = `<div class="chat-gate">Chat is available to confirmed guests.<br><span style="font-size:.85em;opacity:.6;display:block;margin-bottom:1.5rem;">RSVP and get approved to join the conversation.</span><button class="btn btn-solid" onclick="showView('rsvp',document.querySelector('[onclick=\\'showView(\\'rsvp\\',this)\\']'))">RSVP Now</button></div>`;
    return;
  }

  el.innerHTML = `
    <div class="chat-wrap">
      <div class="chat-messages" id="chatMessages"><div class="chat-empty">Loading…</div></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Say something…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="chat-send" onclick="sendMessage()">Send</button>
      </div>
    </div>`;

  // Load history
  const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(200);
  renderMessages(msgs || []);

  // Realtime subscription
  if (chatChannel) sb.removeChannel(chatChannel);
  chatChannel = sb.channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
      appendMessage(payload.new);
      if (!document.getElementById('view-chat')?.classList.contains('active')) showChatBadge();
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
      document.getElementById('msg-' + payload.old.id)?.remove();
    })
    .subscribe();
}

function renderMessages(msgs) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  if (!msgs.length) { el.innerHTML = `<div class="chat-empty">No messages yet. Say hello.</div>`; return; }
  const guestMap = new Map(allGuests.map(g => [g.id, g]));
  el.innerHTML = msgs.map(m => msgHtml(m, guestMap)).join('');
  el.scrollTop = el.scrollHeight;
}

function appendMessage(m) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 120;
  el.querySelector('.chat-empty')?.remove();
  el.insertAdjacentHTML('beforeend', msgHtml(m));
  if (nearBottom) el.scrollTop = el.scrollHeight;
}

function msgHtml(m, guestMap) {
  const mine = currentGuest && m.guest_id === currentGuest.id;
  const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const canDel = mine || adminIn;
  const guest = guestMap ? guestMap.get(m.guest_id) : allGuests.find(g => g.id === m.guest_id);
  const photo = guest?.photos?.[0] || null;
  const avatar = photo
    ? `<img class="chat-avatar" src="${esc(photo)}" alt="" loading="lazy" />`
    : `<div class="chat-avatar-ph">${esc((m.guest_name||'?').charAt(0).toUpperCase())}</div>`;
  return `<div class="chat-msg${mine?' chat-msg-mine':''}" id="msg-${m.id}">
    <div class="chat-msg-row">
      ${avatar}
      <div class="chat-msg-content">
        <div class="chat-msg-header">
          <span class="chat-msg-name${mine?' mine':''}">${esc(m.guest_name)}</span>
          <span class="chat-msg-time">${time}</span>
          ${canDel ? `<button class="chat-msg-del" onclick="deleteMessage('${m.id}')">✕</button>` : ''}
        </div>
        <div class="chat-msg-body">${esc(m.content).replace(/\n/g,'<br>')}</div>
      </div>
    </div>
  </div>`;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || !currentGuest) return;
  const btn = document.querySelector('.chat-send');
  btn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  const { error } = await sb.from('messages').insert({
    guest_id:   currentGuest.id,
    guest_name: currentGuest.name,
    content,
  });
  btn.disabled = false;
  if (error) { input.value = content; alert('Could not send. Try again.'); }
}

async function deleteMessage(id) {
  const { error } = await sb.from('messages').delete().eq('id', id);
  if (error) alert('Could not delete message. Try again.');
}

async function renderRoster() {
  const el = document.getElementById('rosterContent');

  if (!currentGuest && !isPreview && !adminIn) {
    el.innerHTML = renderPinGate('roster');
    return;
  }

  const annImgs = (CONFIG.announcementImages || []).filter(Boolean);
  const hasAnn = CONFIG.announcementText || annImgs.length;
  el.innerHTML = `
    ${hasAnn ? `<div class="announce-banner">
      <div class="announce-header">From the Host</div>
      <div class="announce-body">
        ${CONFIG.announcementText ? `<div class="announce-text">${esc(CONFIG.announcementText).replace(/\n/g,'<br>')}</div>` : ''}
        ${annImgs.length ? `<div class="announce-imgs">${annImgs.map(src=>`<img src="${esc(src)}" alt="" data-src="${esc(src)}" onclick="openLightbox(this.dataset.src)" />`).join('')}</div>` : ''}
      </div>
    </div>` : ''}
    <div class="stats-row" ${CONFIG.waitlistEnabled ? 'style="grid-template-columns:repeat(3,1fr)"' : ''}>
      <div class="stat"><div class="stat-num" id="statA">—</div><div class="stat-label">Confirmed</div></div>
      <div class="stat">
        ${CONFIG.waitlistEnabled
          ? `<div class="stat-num" style="color:var(--gold-dim);" id="statW">—</div><div class="stat-label">Waitlist</div>`
          : `<div class="stat-num blue" id="statP">—</div><div class="stat-label">Pending</div>`}
      </div>
      ${!CONFIG.waitlistEnabled ? `<div class="stat"><div class="stat-num purple" id="statR">—</div><div class="stat-label">Remaining</div></div>` : ''}
      <div class="stat"><div class="stat-num dim" id="statC">${CONFIG.capacity}</div><div class="stat-label">Capacity</div></div>
    </div>
    <div class="cap-wrap">
      <div class="cap-header"><span class="cap-label">Capacity</span><span class="cap-count" id="capText"></span></div>
      <div class="cap-track"><div class="cap-fill" id="capFill" style="width:0%"></div></div>
    </div>
    <div id="guestGrid"><div class="skeleton-grid">${Array.from({length:8}).map(()=>`<div class="skeleton-card"></div>`).join('')}</div></div>
  `;

  const { data: guests, error } = await sb.from('guests').select('*').eq('status','approved').order('created_at');
  if (error) { document.getElementById('guestGrid').innerHTML = `<div class="empty-state">Could not load roster.</div>`; return; }

  allGuests = guests;

  const [{ count: pending }, { count: waitlisted }] = await Promise.all([
    sb.from('guests').select('*', {count:'exact',head:true}).eq('status','pending'),
    sb.from('guests').select('*', {count:'exact',head:true}).eq('status','waitlisted'),
  ]);
  const approved = guests.length;
  const rem = Math.max(0, CONFIG.capacity - approved);
  const pct = CONFIG.capacity > 0 ? Math.min(100, Math.round(approved / CONFIG.capacity * 100)) : 0;

  document.getElementById('statA').textContent = approved;
  if (CONFIG.waitlistEnabled) {
    document.getElementById('statW').textContent = waitlisted || 0;
  } else {
    document.getElementById('statP').textContent = pending || 0;
    document.getElementById('statR').textContent = rem;
  }
  document.getElementById('capText').textContent = `${approved} / ${CONFIG.capacity}`;
  const fill = document.getElementById('capFill');
  fill.style.width = pct + '%';
  fill.className = 'cap-fill' + (pct >= 100 ? ' full' : pct >= 80 ? ' warn' : '');

  if (!guests.length) {
    document.getElementById('guestGrid').innerHTML = `<div class="empty-state">No confirmed guests yet — be among the first.</div>`;
    return;
  }

  document.getElementById('guestGrid').innerHTML =
    vibeFilterBarHTML() +
    `<div id="rosterGridWrap">${rosterCardsHTML(getFilteredGuests())}</div>`;
  applyRosterIndicators();
}

// ══ PIN GATE ═══════════════════════════════════════════════════════
function renderPinGate(target) {
  return `
    <div class="form-wrap" style="margin-top:2rem;">
      <h2 class="form-title">Enter PIN</h2>
      <p class="form-sub">Use your personal RSVP PIN or the guest preview code.</p>
      <div id="pinMsg"></div>
      <div class="pin-input-wrap" id="pinInputs">
        ${[0,1,2,3,4,5].map(i => `<input class="pin-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" id="pd${i}" oninput="pinNext(${i},'${target}')" onkeydown="pinBack(event,${i},'${target}')" />`).join('')}
      </div>
      <div class="btn-row" style="margin-top:1.5rem;">
        <button class="btn btn-solid" onclick="submitPin('${target}')">Enter</button>
      </div>
    </div>`;
}

function pinNext(i, target='roster') {
  const el = document.getElementById('pd' + i);
  el.value = el.value.replace(/[^0-9]/g,'');
  if (el.value && i < 5) document.getElementById('pd' + (i+1))?.focus();
  if (el.value && i === 5) submitPin(target);
}

function pinBack(e, i, target='roster') {
  if (e.key === 'Backspace' && !document.getElementById('pd'+i).value && i > 0)
    document.getElementById('pd'+(i-1))?.focus();
  if (e.key === 'Enter') submitPin(target);
}

function getEnteredPin() {
  return [0,1,2,3,4,5].map(i => document.getElementById('pd'+i)?.value||'').join('');
}

async function submitPin(target) {
  const pin = getEnteredPin();
  const msgEl = document.getElementById('pinMsg');

  if (pin.length < 6) {
    msgEl.innerHTML = `<div class="msg msg-error">Please enter your full 6-digit PIN.</div>`; return;
  }

  // Check guest preview PIN
  if (pin === CONFIG.guestPreviewPin) {
    isPreview = true; currentGuest = null;
    localStorage.setItem('elysium_session', JSON.stringify({pin}));
    showSessionBar('Preview Guest');
    renderRoster(); return;
  }

  // Check personal PIN in Supabase
  const { data, error } = await sb.from('guests').select('*').eq('pin', pin).single();
  if (error || !data) {
    msgEl.innerHTML = `<div class="msg msg-error">PIN not recognised.</div>`; return;
  }

  currentGuest = { id: data.id, name: data.name, pin: data.pin }; isPreview = false;
  localStorage.setItem('elysium_session', JSON.stringify({id:data.id, name:data.name, pin}));
  showSessionBar(data.name);
  await loadSocialData();
  updateFireBadge();
  showFireToast();

  if (target === 'roster') renderRoster();
  else if (target === 'account') renderAccount();
}

function handleSlot(i, input) { const f=input.files[0]; if(f) processSlot(i,f); }

function processSlot(i, file) {
  if (!file.type.startsWith('image/')) { alert('Please select an image file.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max=700; let w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      photoSlots[i]=c.toDataURL('image/jpeg',0.65); updateSlotUI(i);
    };
    img.onerror = () => alert('Could not load that image. Try a different file.');
    img.src=e.target.result;
  };
  reader.onerror = () => alert('Could not read that file. Try again.');
  reader.readAsDataURL(file);
}

function updateSlotUI(i) {
  const slot=document.getElementById('slot'+i);
  if (!slot) return;
  const inner=slot.querySelector('.slot-inner');
  slot.querySelector('.slot-preview')?.remove();
  slot.querySelector('.slot-remove')?.remove();
  if (photoSlots[i]) {
    inner.style.display='none';
    const img=document.createElement('img'); img.className='slot-preview'; img.src=photoSlots[i];
    const btn=document.createElement('button'); btn.className='slot-remove'; btn.textContent='✕';
    btn.onclick=ev=>{ev.stopPropagation();photoSlots[i]=null;inner.style.display='';img.remove();btn.remove();};
    slot.appendChild(img); slot.appendChild(btn);
  } else { inner.style.display=''; }
}

function generatePin() {

function copyPin(pin) {

async function submitRsvp() {
  const name  = document.getElementById('rName').value.trim();
  const role  = document.getElementById('rRole').value.trim();
  const msgEl = document.getElementById('formMsg');

  if (!name) { msgEl.innerHTML=`<div class="msg msg-error">Please enter your name.</div>`; return; }
  if (!role) { msgEl.innerHTML=`<div class="msg msg-error">Please enter your role.</div>`; return; }
  if (!document.getElementById('rTested').value.trim()) { msgEl.innerHTML=`<div class="msg msg-error">Please enter your last tested date.</div>`; return; }
  if (!selectedPrep) { msgEl.innerHTML=`<div class="msg msg-error">Please select your PrEP status.</div>`; return; }

  const btn = document.querySelector('#rsvpContent .btn-solid');
  btn.disabled = true; btn.textContent = 'Submitting…';

  const pin = generatePin();
  const photos = photoSlots.filter(Boolean);

  // Re-check capacity at submit time to avoid race conditions
  const { count: approvedNow } = await sb.from('guests').select('*',{count:'exact',head:true}).eq('status','approved');
  const submitAtCapacity = approvedNow >= CONFIG.capacity;
  let submitStatus;
  if (submitAtCapacity && CONFIG.waitlistEnabled) submitStatus = 'waitlisted';
  else if (submitAtCapacity && !CONFIG.waitlistEnabled) {
    msgEl.innerHTML=`<div class="msg msg-error">Sorry, the event just reached capacity.</div>`;
    btn.disabled=false; btn.textContent='Request Admission'; return;
  }
  else submitStatus = 'pending';

  const { data, error } = await sb.from('guests').insert({
    name,
    role,
    photos,
    vibes:        [...selectedVibes],
    bio:          document.getElementById('rBio').value.trim(),
    last_tested:  document.getElementById('rTested').value.trim(),
    prep:         selectedPrep,
    age:          document.getElementById('rAge').value ? parseInt(document.getElementById('rAge').value) : null,
    pin,
    status: submitStatus,
  }).select().single();

  if (error) {
    msgEl.innerHTML=`<div class="msg msg-error">Something went wrong. Please try again.</div>`;
    btn.disabled=false; btn.textContent='Request Admission'; return;
  }

  currentGuest = { id: data.id, name: data.name, pin: data.pin }; isPreview = false;
  photoSlots = [null,null,null]; selectedVibes = []; selectedPrep = null;
  localStorage.setItem('elysium_session', JSON.stringify({id:data.id, name:data.name, pin}));
  showSessionBar(data.name);
  await loadSocialData();
  updateFireBadge();
  showFireToast();

  const isWaitlisted = submitStatus === 'waitlisted';
  const statusLine = isWaitlisted
    ? 'You\'re on the waitlist. We\'ll be in touch if a spot opens.'
    : 'Your request is under review.';

  document.getElementById('rsvpContent').innerHTML = `
    <h2 class="form-title" style="margin-bottom:1rem;">${isWaitlisted ? 'You\'re on the list.' : `Thank you, ${esc(name)}.`}</h2>
    <p class="form-sub">${statusLine}</p>
    <div class="pin-display">
      <div class="pin-label">Your Personal PIN</div>
      <div class="pin-number">${pin}</div>
      <div class="pin-warning">Save this — it's your key to log back in and check your status.</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-solid" id="copyPinBtn" onclick="copyPin('${pin}')">Copy PIN</button>
      ${isWaitlisted ? '' : `<button class="btn btn-ghost" onclick="showView('roster',null)">View Roster</button>`}
    </div>`;
}

function exportGuestCSV() {
  if (!adminCachedData) return;
  const rows = [['Name', 'Role', 'Age', 'PIN', 'Vibes', 'PrEP', 'Bio', 'Fires Received', 'Arrived']];
  for (const g of adminCachedData.appr) {
    const firesRcvd = Object.values(socialData.fires).filter(arr => arr.includes(g.id)).length;
    rows.push([
      g.name || '', g.role || '', g.age || '', g.pin || '',
      (g.vibes || []).join(';'), g.prep || '',
      (g.bio || '').replace(/\n/g, ' '),
      firesRcvd, doorCheckins[g.id] ? 'Yes' : 'No'
    ]);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'guests.csv'; a.click();
  URL.revokeObjectURL(url);
}
